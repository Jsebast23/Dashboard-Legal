<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONLECOL • Portal de Seguimiento</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F7FC;
            min-height: 100vh;
            padding: 24px;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1A1F2E;
        }

        .dashboard {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* ===== EFECTOS GLOBALES ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(194, 162, 126, 0.2);
            border-radius: 32px;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .glass-card:hover {
            border-color: rgba(194, 162, 126, 0.5);
            box-shadow: 0 20px 40px -12px rgba(194, 162, 126, 0.25);
        }

        /* ===== TARJETA SUPERIOR ===== */
        .top-block {
            background: white;
            border-radius: 36px;
            padding: 32px;
            border: 1px solid rgba(194, 162, 126, 0.2);
            box-shadow: 0 25px 40px -18px rgba(58, 15, 20, 0.1);
        }

        .service-header {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(194, 162, 126, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .service-title {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .service-title h2 {
            color: #3A0F14;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #3A0F14 0%, #C2A27E 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .service-badge {
            background: linear-gradient(135deg, #3A0F14 0%, #6A2A2F 100%);
            color: #FFFFFF;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid rgba(194, 162, 126, 0.4);
            box-shadow: 0 0 15px rgba(194, 162, 126, 0.2);
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .card {
            background: white;
            border: 1px solid rgba(194, 162, 126, 0.15);
            border-radius: 28px;
            padding: 22px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .card:hover {
            border-color: #C2A27E;
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -8px rgba(194, 162, 126, 0.25);
            background: white;
        }

        .card-icon {
            width: 54px;
            height: 54px;
            background: linear-gradient(145deg, #F4F1EC, #E6DDCF);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #3A0F14;
            border: 1px solid #C2A27E40;
            box-shadow: 0 5px 12px rgba(194, 162, 126, 0.1);
        }

        .card-content {
            flex: 1;
        }

        .card-label {
            font-size: 11px;
            color: #8F95B2;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .card-value {
            font-size: 19px;
            font-weight: 700;
            color: #1A1F2E;
            line-height: 1.2;
        }

        .card-subvalue {
            font-size: 12px;
            color: #A5A9C5;
            margin-top: 4px;
        }

        .progress-section {
            background: #F8FAFF;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(194, 162, 126, 0.15);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .progress-header div {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .progress-title {
            font-weight: 500;
            color: #1A1F2E;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .progress-stage {
            background: linear-gradient(145deg, #F4F1EC, #E6DDCF);
            color: #3A0F14;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #C2A27E60;
        }

        .progress-percentage {
            font-weight: 700;
            color: #3A0F14;
            font-size: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 14px;
            background: #E6E9F2;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #E6DDCF;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3A0F14, #C2A27E, #6A2A2F);
            background-size: 200% 100%;
            border-radius: 20px;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 20px rgba(194, 162, 126, 0.4);
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
            100% { background-position: 0% 0%; }
        }

        .progress-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 14px;
            color: #5F6482;
            font-weight: 500;
        }

        /* ===== BLOQUE DE FASES ===== */
        .fases-block {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .fase-card {
            background: white;
            border-radius: 36px;
            border: 1px solid rgba(194, 162, 126, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.03);
        }

        .fase-card:hover {
            border-color: rgba(194, 162, 126, 0.5);
            box-shadow: 0 15px 35px -12px rgba(194, 162, 126, 0.25);
        }

        .fase-header {
            padding: 24px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(194, 162, 126, 0.1);
        }

        .fase-header:hover {
            background: #F8FAFF;
        }

        .fase-header[aria-expanded="true"] {
            border-bottom-color: rgba(194, 162, 126, 0.3);
        }

        .fase-titulo {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .fase-nombre {
            font-size: 22px;
            font-weight: 600;
            color: #1A1F2E;
            letter-spacing: -0.3px;
        }

        .fase-estado-badge {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1px solid;
        }

        .estado-pendiente {
            background: #EFF6FF;
            color: #3B82F6;
            border-color: #3B82F640;
        }

        .estado-progreso {
            background: #FEF3C7;
            color: #F59E0B;
            border-color: #F59E0B40;
        }

        .estado-completado {
            background: #D1FAE5;
            color: #10B981;
            border-color: #10B98140;
        }

        .flecha-container {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F4F1EC;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .flecha {
            font-size: 20px;
            color: #3A0F14;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .rotado {
            transform: rotate(180deg);
        }

        .fase-contenido {
            padding: 28px;
            background: #FAFCFF;
        }

        /* ===== PASOS ===== */
        .pasos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 8px;
        }

        .paso-card {
            background: white;
            border-radius: 26px;
            padding: 22px;
            border: 1px solid rgba(194, 162, 126, 0.15);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .paso-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, #C2A27E, #3A0F14);
            opacity: 0.7;
        }

        .paso-card:hover {
            transform: translateY(-4px);
            border-color: #C2A27E;
            box-shadow: 0 20px 30px -12px rgba(194, 162, 126, 0.25);
        }

        .paso-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .paso-titulo {
            font-size: 18px;
            font-weight: 600;
            color: #1A1F2E;
        }

        .paso-estado-badge {
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(194, 162, 126, 0.05);
            border: 1px solid;
            letter-spacing: 0.8px;
        }

        .paso-descripcion {
            color: #5F6482;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .paso-fechas {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8F95B2;
            border-top: 1px dashed #E6DDCF;
            padding-top: 14px;
        }

        /* ===== SUBPASOS ===== */
        .subpasos-container {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .subpaso-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #F8FAFF;
            border-radius: 20px;
            border: 1px solid rgba(194, 162, 126, 0.15);
            transition: all 0.2s;
            cursor: pointer;
        }

        .subpaso-item:hover {
            background: rgba(194, 162, 126, 0.05);
            border-color: rgba(194, 162, 126, 0.4);
            transform: translateX(4px);
        }

        .subpaso-item:active {
            transform: scale(0.98);
            background: rgba(194, 162, 126, 0.15) !important;
            transition: all 0.08s ease;
        }

        .subpaso-item:active .subpaso-dot {
            box-shadow: 0 0 25px #C2A27E;
            transform: scale(1.4);
        }

        .subpaso-item:active .subpaso-estado {
            color: #3A0F14;
            font-weight: 600;
        }

        .subpaso-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #C2A27E;
            transition: all 0.2s;
        }

        .subpaso-dot.completado {
            background: #10B981;
            box-shadow: 0 0 12px #10B981;
        }

        .subpaso-dot.progreso {
            background: #F59E0B;
            box-shadow: 0 0 12px #F59E0B;
        }

        .subpaso-dot.pendiente {
            background: #3B82F6;
            box-shadow: 0 0 12px #3B82F6;
        }

        .subpaso-desc {
            flex: 1;
            font-size: 13px;
            color: #1A1F2E;
        }

        .subpaso-estado {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            background: white;
            border: 1px solid rgba(194, 162, 126, 0.2);
            color: #5F6482;
        }

        /* ===== ERROR ===== */
        .error-message {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 40px;
            border: 1px solid rgba(194, 162, 126, 0.2);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
        }

        .error-message h2 {
            color: #3A0F14;
            margin-bottom: 16px;
            font-size: 28px;
            font-weight: 500;
        }

        .error-message p {
            color: #8F95B2;
            font-size: 16px;
        }

        /* ===== ANIMACIONES ===== */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(194, 162, 126, 0.3); }
            50% { box-shadow: 0 0 20px rgba(194, 162, 126, 0.5); }
            100% { box-shadow: 0 0 5px rgba(194, 162, 126, 0.3); }
        }

        .service-badge {
            animation: pulseGlow 3s infinite;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .info-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .service-title {
                flex-direction: column;
                align-items: flex-start;
            }
            .fase-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .fase-titulo {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 640px) {
            .info-cards {
                grid-template-columns: 1fr;
            }
            .pasos-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard" id="dashboardContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf2Bpc_146WvEVlOoFsbQfEGMjWZpWBz0",
            authDomain: "dashboard-legal-eedee.firebaseapp.com",
            projectId: "dashboard-legal-eedee",
            storageBucket: "dashboard-legal-eedee.firebasestorage.app",
            messagingSenderId: "635760171133",
            appId: "1:635760171133:web:c7bb96dbd5770218483914"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        function formatearFecha(fechaString) {
            if (!fechaString) return 'No definida';
            const fecha = new Date(fechaString);
            return fecha.toLocaleDateString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function getEstadoClass(estado) {
            const clases = {
                'pendiente': 'estado-pendiente',
                'en_progreso': 'estado-progreso',
                'completado': 'estado-completado'
            };
            return clases[estado] || 'estado-pendiente';
        }

        function getEstadoTexto(estado) {
            const textos = {
                'pendiente': 'Pendiente',
                'en_progreso': 'En progreso',
                'completado': 'Completado'
            };
            return textos[estado] || estado;
        }

        function calcularTotales(fases) {
            let totalPasos = 0;
            let completados = 0;
            
            fases?.forEach(fase => {
                fase.pasos?.forEach(paso => {
                    totalPasos++;
                    if (paso.estado === 'completado') completados++;
                    paso.subpasos?.forEach(() => {
                        totalPasos++;
                        if (paso.estado === 'completado') completados++;
                    });
                });
            });
            
            return { totalPasos, completados };
        }

        function cargarDashboard() {
            const container = document.getElementById('dashboardContainer');
            const urlParams = new URLSearchParams(window.location.search);
            const procesoId = urlParams.get('id');
            
            if (!procesoId) {
                container.innerHTML = `<div class="error-message"><h2>🔍 Proceso no encontrado</h2><p>No se ha especificado un ID de proceso válido.</p></div>`;
                return;
            }

            const procesoRef = ref(database, `procesos/${procesoId}`);
            onValue(procesoRef, (snapshot) => {
                const proceso = snapshot.val();
                
                if (!proceso) {
                    container.innerHTML = `<div class="error-message"><h2>⚠️ Proceso no encontrado</h2><p>El proceso que buscas no existe o ha sido eliminado.</p><p style="margin-top: 10px;">ID: ${procesoId}</p></div>`;
                    return;
                }

                const progreso = proceso.progreso || { porcentaje: 0, completados: 0, pendientes: 0, fase: 'Inicio' };
                const { totalPasos, completados: totalCompletados } = calcularTotales(proceso.fases);

                let fasesHtml = '';
                if (proceso.fases && proceso.fases.length > 0) {
                    fasesHtml = '<div class="fases-block">';
                    proceso.fases.forEach((fase, idx) => {
                        const estadoClass = getEstadoClass(fase.estado);
                        const estadoTexto = getEstadoTexto(fase.estado);
                        
                        let pasosHtml = '';
                        if (fase.pasos && fase.pasos.length > 0) {
                            pasosHtml = '<div class="pasos-grid">';
                            fase.pasos.forEach(paso => {
                                const pasoEstadoClass = getEstadoClass(paso.estado);
                                const pasoEstadoTexto = getEstadoTexto(paso.estado);
                                
                                let subpasosHtml = '';
                                if (paso.subpasos && paso.subpasos.length > 0) {
                                    subpasosHtml = '<div class="subpasos-container">';
                                    paso.subpasos.forEach(sub => {
                                        const dotClass = sub.estado === 'completado' ? 'completado' : 
                                                        sub.estado === 'en_progreso' ? 'progreso' : 'pendiente';
                                        subpasosHtml += `
                                            <div class="subpaso-item" onclick="toggleSubpaso(this)">
                                                <span class="subpaso-dot ${dotClass}"></span>
                                                <span class="subpaso-desc">${sub.descripcion}</span>
                                                <span class="subpaso-estado">${sub.estado}</span>
                                            </div>
                                        `;
                                    });
                                    subpasosHtml += '</div>';
                                }
                                
                                pasosHtml += `
                                    <div class="paso-card">
                                        <div class="paso-header">
                                            <span class="paso-titulo">${paso.titulo}</span>
                                            <span class="paso-estado-badge ${pasoEstadoClass}">${pasoEstadoTexto}</span>
                                        </div>
                                        ${paso.descripcion ? `<div class="paso-descripcion">${paso.descripcion}</div>` : ''}
                                        <div class="paso-fechas">
                                            <span><i class="far fa-calendar-alt" style="margin-right: 5px;"></i> ${formatearFecha(paso.fechaInicio)}</span>
                                            ${paso.fechaEstimada ? `<span><i class="far fa-clock" style="margin-right: 5px;"></i> ${formatearFecha(paso.fechaEstimada)}</span>` : ''}
                                        </div>
                                        ${subpasosHtml}
                                    </div>
                                `;
                            });
                            pasosHtml += '</div>';
                        } else {
                            pasosHtml = '<p style="color: #8F95B2; text-align: center; padding: 30px;">✨ No hay pasos definidos en esta fase</p>';
                        }
                        
                        fasesHtml += `
                            <div class="fase-card">
                                <div class="fase-header" onclick="toggleFase('fase-${idx}', this)" aria-expanded="true">
                                    <div class="fase-titulo">
                                        <span class="fase-nombre">${fase.nombre}</span>
                                        <span class="fase-estado-badge ${estadoClass}">${estadoTexto}</span>
                                    </div>
                                    <div class="flecha-container">
                                        <i class="fas fa-chevron-down flecha" id="flecha-${idx}"></i>
                                    </div>
                                </div>
                                <div id="fase-${idx}" class="fase-contenido" style="display: block;">
                                    ${pasosHtml}
                                </div>
                            </div>
                        `;
                    });
                    fasesHtml += '</div>';
                } else {
                    fasesHtml = '<div style="text-align: center; padding: 60px; background: white; border-radius: 40px;"><p style="color: #8F95B2; font-size: 16px;">📋 No hay fases definidas para este proceso</p></div>';
                }

                container.innerHTML = `
                    <div class="top-block">
                        <div class="service-header">
                            <div class="service-title">
                                <h2>⚖️ ${proceso.servicio.nombre || 'Seguimiento de Caso'}</h2>
                                <span class="service-badge">${progreso.fase || 'En proceso'}</span>
                            </div>
                        </div>

                        <div class="info-cards">
                            <div class="card">
                                <div class="card-icon"><i class="fas fa-file-alt"></i></div>
                                <div class="card-content">
                                    <span class="card-label">Servicio</span>
                                    <span class="card-value">${proceso.servicio.nombre || 'No especificado'}</span>
                                    <span class="card-subvalue">Exp. ${proceso.servicio.expediente || 'N/A'}</span>
                                </div>
                            </div>

                            <div class="card">
                                <div class="card-icon"><i class="fas fa-user-tie"></i></div>
                                <div class="card-content">
                                    <span class="card-label">Cliente</span>
                                    <span class="card-value">${proceso.cliente.nombre || 'No especificado'}</span>
                                    <span class="card-subvalue">"${proceso.cliente.apodo || 'Sin apodo'}"</span>
                                </div>
                            </div>

                            <div class="card">
                                <div class="card-icon"><i class="fas fa-qrcode"></i></div>
                                <div class="card-content">
                                    <span class="card-label">Código</span>
                                    <span class="card-value">${proceso.servicio.codigo || 'N/A'}</span>
                                    <span class="card-subvalue">ID: ${proceso.servicio.idInterno || 'N/A'}</span>
                                </div>
                            </div>

                            <div class="card">
                                <div class="card-icon"><i class="fas fa-calendar-check"></i></div>
                                <div class="card-content">
                                    <span class="card-label">Inicio</span>
                                    <span class="card-value">${formatearFecha(proceso.servicio.fechaInicio)}</span>
                                    <span class="card-subvalue">#${procesoId.slice(-6)}</span>
                                </div>
                            </div>
                        </div>

                        <div class="progress-section">
                            <div class="progress-header">
                                <div>
                                    <span class="progress-title">Progreso del caso</span>
                                    <span class="progress-stage">${progreso.fase || 'Inicio'}</span>
                                </div>
                                <span class="progress-percentage">${progreso.porcentaje || 0}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progreso.porcentaje || 0}%;"></div>
                            </div>
                            <div class="progress-footer">
                                <span><i class="fas fa-check-circle" style="color: #10B981;"></i> ${totalCompletados} completados</span>
                                <span><i class="fas fa-hourglass-half" style="color: #F59E0B;"></i> ${totalPasos - totalCompletados} pendientes</span>
                            </div>
                        </div>
                    </div>

                    ${fasesHtml}

                    <div style="text-align: center; color: #A5A9C5; font-size: 12px; margin-top: 24px; letter-spacing: 0.5px;">
                        <i class="fas fa-shield-alt" style="margin-right: 5px; color: #C2A27E;"></i> Portal seguro · Actualización en tiempo real
                    </div>
                `;
            });
        }

        window.toggleFase = function(id, header) {
            const elemento = document.getElementById(id);
            const flecha = header.querySelector('.flecha');
            const expanded = header.getAttribute('aria-expanded') === 'true' ? false : true;
            
            header.setAttribute('aria-expanded', expanded);
            
            if (expanded) {
                elemento.style.display = 'block';
                flecha.classList.remove('rotado');
            } else {
                elemento.style.display = 'none';
                flecha.classList.add('rotado');
            }
        };

        window.toggleSubpaso = function(element) {
            element.classList.toggle('subpaso-item-active');
        };

        document.addEventListener('DOMContentLoaded', cargarDashboard);
        
        window.formatearFecha = formatearFecha;
        window.getEstadoClass = getEstadoClass;
        window.getEstadoTexto = getEstadoTexto;
    </script>
</body>
</html>
