<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - CONLECOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F7FC;
            font-family: 'Space Grotesk', sans-serif;
            padding: 24px;
            color: #1A1F2E;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 24px 32px;
            border-radius: 36px;
            margin-bottom: 28px;
            border: 1px solid rgba(194, 162, 126, 0.3);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #3A0F14;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #3A0F14 0%, #C2A27E 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            background: white;
            color: #3A0F14;
            border: 2px solid #C2A27E;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(194, 162, 126, 0.1);
        }

        .btn:hover {
            background: #3A0F14;
            border-color: #3A0F14;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #3A0F1460;
        }

        .btn-secondary {
            background: #3A0F14;
            border-color: #3A0F14;
            color: white;
        }

        .btn-secondary:hover {
            background: #6A2A2F;
            border-color: #6A2A2F;
        }

        .btn-danger {
            background: #f56565;
            border-color: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            border-color: #e53e3e;
        }

        .form-section {
            background: white;
            padding: 32px;
            border-radius: 36px;
            margin-bottom: 28px;
            border: 1px solid rgba(194, 162, 126, 0.3);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.08);
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-section h2 {
            color: #3A0F14;
            font-size: 26px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            color: #8F95B2;
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 14px 18px;
            border: 1px solid #E6DDCF;
            border-radius: 20px;
            font-size: 15px;
            background: white;
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #C2A27E;
            box-shadow: 0 0 0 4px rgba(194, 162, 126, 0.2);
        }

        .fases-section {
            background: #FAFCFF;
            border-radius: 28px;
            padding: 28px;
            margin: 28px 0;
            border: 2px dashed #C2A27E80;
        }

        .fases-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .fases-header h3 {
            color: #1A1F2E;
            font-size: 20px;
            font-weight: 600;
        }

        .fases-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .fase-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(194, 162, 126, 0.3);
            transition: all 0.2s;
        }

        .fase-card:hover {
            border-color: #C2A27E;
            box-shadow: 0 10px 25px -8px rgba(194, 162, 126, 0.3);
        }

        .fase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #C2A27E40;
        }

        .fase-nombre {
            font-size: 18px;
            font-weight: 600;
            color: #3A0F14;
        }

        .fase-estado {
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .estado-pendiente {
            background: #EFF6FF;
            color: #3B82F6;
            border: 1px solid #3B82F6;
        }
        .estado-progreso {
            background: #FEF3C7;
            color: #F59E0B;
            border: 1px solid #F59E0B;
        }
        .estado-completado {
            background: #D1FAE5;
            color: #10B981;
            border: 1px solid #10B981;
        }

        .pasos-container {
            margin-left: 20px;
        }

        .paso-card {
            background: #F8FAFF;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 12px;
            border-left: 4px solid #C2A27E;
        }

        .paso-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .paso-titulo {
            font-weight: 600;
            color: #1A1F2E;
        }

        .paso-actions {
            display: flex;
            gap: 6px;
        }

        .subpasos-container {
            margin-top: 12px;
            padding-left: 12px;
        }

        .subpaso-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 6px;
            border: 1px solid #E6DDCF;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.2s;
        }
        .btn-icon:hover {
            background: rgba(194, 162, 126, 0.2);
        }

        .form-fase, .form-paso, .form-subpaso {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #C2A27E;
        }

        .hidden {
            display: none;
        }

        .procesos-list {
            background: white;
            padding: 32px;
            border-radius: 36px;
            border: 1px solid rgba(194, 162, 126, 0.3);
        }

        .proceso-card {
            border: 1px solid #E6DDCF;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .proceso-card:hover {
            border-color: #C2A27E;
            box-shadow: 0 10px 25px -8px rgba(194,162,126,0.3);
        }

        .proceso-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .proceso-header h3 {
            color: #3A0F14;
            font-size: 18px;
        }
        .proceso-badge {
            background: #C2A27E;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
        }

        .proceso-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 14px;
            color: #5F6482;
            margin-bottom: 12px;
        }

        .proceso-link {
            background: #F8FAFF;
            padding: 10px 14px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .link-cliente {
            background: #3A0F14;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 11px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #C2A27E80;
            border-radius: 50%;
            border-top-color: #3A0F14;
            animation: spin 1s ease infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1><i class="fas fa-gavel" style="margin-right: 12px;"></i>CONLECOL · Panel Administrativo</h1>
            <button class="btn" onclick="mostrarFormulario()"><i class="fas fa-plus"></i> Nuevo Proceso</button>
        </header>

        <div id="formProceso" class="form-section">
            <h2 id="formTitulo">Crear Nuevo Proceso</h2>
            <input type="hidden" id="procesoId" value="">
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Servicio Contratado</label>
                    <input type="text" id="servicio" placeholder="Ej: Divorcio Contencioso">
                </div>
                <div class="form-group">
                    <label>Expediente</label>
                    <input type="text" id="expediente" placeholder="Ej: #1234-2024">
                </div>
                <div class="form-group">
                    <label>Nombre del Cliente</label>
                    <input type="text" id="clienteNombre" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Apodo</label>
                    <input type="text" id="clienteApodo" placeholder="Apodo">
                </div>
                <div class="form-group">
                    <label>Email del Cliente</label>
                    <input type="email" id="clienteEmail" placeholder="cliente@email.com">
                </div>
                <div class="form-group">
                    <label>Código del Servicio</label>
                    <input type="text" id="codigoServicio" placeholder="Ej: DIV-2403-156">
                </div>
                <div class="form-group">
                    <label>ID Interno</label>
                    <input type="text" id="idInterno" placeholder="Ej: CL-7890">
                </div>
                <div class="form-group">
                    <label>Fecha de Inicio</label>
                    <input type="date" id="fechaInicio">
                </div>
            </div>

            <div class="fases-section">
                <div class="fases-header">
                    <h3><i class="fas fa-layer-group" style="margin-right: 8px;"></i>Fases del Proceso</h3>
                    <button class="btn btn-secondary" onclick="mostrarFormularioFase()"><i class="fas fa-plus"></i> Agregar Fase</button>
                </div>

                <div id="fasesContainer" class="fases-grid"></div>

                <!-- Formulario Fase -->
                <div id="formFase" class="form-fase hidden">
                    <h4 id="formFaseTitle">Nueva Fase</h4>
                    <input type="hidden" id="faseIndex" value="-1">
                    <div class="form-group">
                        <label>Nombre de la Fase</label>
                        <input type="text" id="faseNombre" placeholder="Ej: Diagnóstico">
                    </div>
                    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="guardarFase()">Guardar Fase</button>
                        <button class="btn" onclick="cancelarFormularioFase()">Cancelar</button>
                    </div>
                </div>

                <!-- Formulario Paso -->
                <div id="formPaso" class="form-paso hidden">
                    <h4 id="formPasoTitle">Nuevo Paso</h4>
                    <input type="hidden" id="faseActualIndex" value="-1">
                    <input type="hidden" id="pasoIndex" value="-1">
                    
                    <div class="form-group">
                        <label>Título del Paso</label>
                        <input type="text" id="pasoTitulo" placeholder="Ej: Envío formulario">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="form-group">
                            <label>Fecha Inicio</label>
                            <input type="date" id="pasoFechaInicio">
                        </div>
                        <div class="form-group">
                            <label>Fecha Estimada</label>
                            <input type="date" id="pasoFechaEstimada">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="pasoEstado">
                            <option value="pendiente">Pendiente</option>
                            <option value="en_progreso">En Progreso</option>
                            <option value="completado">Completado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="pasoDescripcion" rows="2"></textarea>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 16px; background: #F8FAFF; border-radius: 18px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h5 style="color: #3A0F14;">Subpasos</h5>
                            <button class="btn-icon" onclick="mostrarFormularioSubpaso()"><i class="fas fa-plus"></i> Agregar</button>
                        </div>
                        <div id="subpasosContainer" class="subpasos-list" style="max-height: 200px; overflow-y: auto;"></div>
                    </div>
                    
                    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="guardarPaso()">Guardar Paso</button>
                        <button class="btn" onclick="cancelarFormularioPaso()">Cancelar</button>
                    </div>
                </div>

                <!-- Formulario Subpaso -->
                <div id="formSubpaso" class="form-subpaso hidden">
                    <h5>Nuevo Subpaso</h5>
                    <input type="hidden" id="subpasoIndex" value="-1">
                    <div class="form-group">
                        <label>Descripción</label>
                        <input type="text" id="subpasoDescripcion" placeholder="Ej: Cliente responde">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="subpasoEstado">
                            <option value="pendiente">Pendiente</option>
                            <option value="completado">Completado</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="guardarSubpaso()">Guardar</button>
                        <button class="btn" onclick="cancelarFormularioSubpaso()">Cancelar</button>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn btn-secondary" onclick="guardarProceso()" id="btnGuardarProceso"><i class="fas fa-save"></i> Guardar Proceso</button>
                <button class="btn" onclick="cancelarFormulario()">Cancelar</button>
            </div>
        </div>

        <div class="procesos-list">
            <h2 style="margin-bottom: 24px;">Procesos Activos</h2>
            <div id="listaProcesos"></div>
        </div>
    </div>

    <script type="module">
        // Importar Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCf2Bpc_146WvEVlOoFsbQfEGMjWZpWBz0",
            authDomain: "dashboard-legal-eedee.firebaseapp.com",
            projectId: "dashboard-legal-eedee",
            storageBucket: "dashboard-legal-eedee.firebasestorage.app",
            messagingSenderId: "635760171133",
            appId: "1:635760171133:web:c7bb96dbd5770218483914"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/admin/login.html';
            }
        });

        // ===== VARIABLES GLOBALES =====
        let fasesTemporales = [];

        // Utilidad para generar IDs únicos
        function generarId() {
            return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        // ===== FUNCIONES DE FASE =====
        function mostrarFormularioFase(index = -1) {
            document.getElementById('formFase').classList.remove('hidden');
            document.getElementById('faseIndex').value = index;
            if (index >= 0 && fasesTemporales[index]) {
                document.getElementById('formFaseTitle').textContent = 'Editar Fase';
                document.getElementById('faseNombre').value = fasesTemporales[index].nombre || '';
            } else {
                document.getElementById('formFaseTitle').textContent = 'Nueva Fase';
                document.getElementById('faseNombre').value = '';
            }
        }

        function cancelarFormularioFase() {
            document.getElementById('formFase').classList.add('hidden');
            document.getElementById('faseIndex').value = '-1';
        }

        function guardarFase() {
            const index = parseInt(document.getElementById('faseIndex').value);
            const nombre = document.getElementById('faseNombre').value.trim();
            if (!nombre) { alert('El nombre de la fase es obligatorio'); return; }
            const fase = {
                id: generarId(),
                nombre,
                estado: 'pendiente',
                pasos: []
            };
            if (index >= 0) {
                fasesTemporales[index] = fase;
            } else {
                fasesTemporales.push(fase);
            }
            actualizarGridFases();
            cancelarFormularioFase();
        }

        function eliminarFase(index) {
            if (confirm('¿Eliminar esta fase?')) {
                fasesTemporales.splice(index, 1);
                actualizarGridFases();
            }
        }

        // ===== FUNCIONES DE PASO =====
        function mostrarFormularioPaso(faseIndex, pasoIndex = -1) {
            document.getElementById('formPaso').classList.remove('hidden');
            document.getElementById('faseActualIndex').value = faseIndex;
            document.getElementById('pasoIndex').value = pasoIndex;
            if (pasoIndex >= 0 && fasesTemporales[faseIndex]?.pasos[pasoIndex]) {
                const paso = fasesTemporales[faseIndex].pasos[pasoIndex];
                document.getElementById('formPasoTitle').textContent = 'Editar Paso';
                document.getElementById('pasoTitulo').value = paso.titulo || '';
                document.getElementById('pasoFechaInicio').value = paso.fechaInicio || '';
                document.getElementById('pasoFechaEstimada').value = paso.fechaEstimada || '';
                document.getElementById('pasoEstado').value = paso.estado || 'pendiente';
                document.getElementById('pasoDescripcion').value = paso.descripcion || '';
                window.subpasosTemporales = paso.subpasos || [];
            } else {
                document.getElementById('formPasoTitle').textContent = 'Nuevo Paso';
                document.getElementById('pasoTitulo').value = '';
                document.getElementById('pasoFechaInicio').value = '';
                document.getElementById('pasoFechaEstimada').value = '';
                document.getElementById('pasoEstado').value = 'pendiente';
                document.getElementById('pasoDescripcion').value = '';
                window.subpasosTemporales = [];
            }
            actualizarListaSubpasos();
        }

        function cancelarFormularioPaso() {
            document.getElementById('formPaso').classList.add('hidden');
            document.getElementById('faseActualIndex').value = '-1';
            document.getElementById('pasoIndex').value = '-1';
            window.subpasosTemporales = [];
        }

        function guardarPaso() {
            const faseIndex = parseInt(document.getElementById('faseActualIndex').value);
            const pasoIndex = parseInt(document.getElementById('pasoIndex').value);
            if (faseIndex < 0 || faseIndex >= fasesTemporales.length) { alert('Error: Fase no válida'); return; }
            const paso = {
                id: generarId(),
                titulo: document.getElementById('pasoTitulo').value.trim(),
                fechaInicio: document.getElementById('pasoFechaInicio').value,
                fechaEstimada: document.getElementById('pasoFechaEstimada').value,
                estado: document.getElementById('pasoEstado').value,
                descripcion: document.getElementById('pasoDescripcion').value.trim(),
                subpasos: window.subpasosTemporales || []
            };
            if (!paso.titulo) { alert('El título del paso es obligatorio'); return; }
            if (pasoIndex >= 0) {
                fasesTemporales[faseIndex].pasos[pasoIndex] = paso;
            } else {
                if (!fasesTemporales[faseIndex].pasos) fasesTemporales[faseIndex].pasos = [];
                fasesTemporales[faseIndex].pasos.push(paso);
            }
            actualizarEstadoFase(faseIndex);
            actualizarGridFases();
            cancelarFormularioPaso();
        }

        function eliminarPaso(faseIndex, pasoIndex) {
            if (confirm('¿Eliminar este paso?')) {
                fasesTemporales[faseIndex].pasos.splice(pasoIndex, 1);
                actualizarEstadoFase(faseIndex);
                actualizarGridFases();
            }
        }

        // ===== FUNCIONES DE SUBPASO =====
        function mostrarFormularioSubpaso(index = -1) {
            document.getElementById('formSubpaso').classList.remove('hidden');
            document.getElementById('subpasoIndex').value = index;
            if (index >= 0 && window.subpasosTemporales[index]) {
                document.getElementById('subpasoDescripcion').value = window.subpasosTemporales[index].descripcion || '';
                document.getElementById('subpasoEstado').value = window.subpasosTemporales[index].estado || 'pendiente';
            } else {
                document.getElementById('subpasoDescripcion').value = '';
                document.getElementById('subpasoEstado').value = 'pendiente';
            }
        }

        function cancelarFormularioSubpaso() {
            document.getElementById('formSubpaso').classList.add('hidden');
            document.getElementById('subpasoIndex').value = '-1';
        }

        function guardarSubpaso() {
            const index = parseInt(document.getElementById('subpasoIndex').value);
            const subpaso = {
                id: generarId(),
                descripcion: document.getElementById('subpasoDescripcion').value.trim(),
                estado: document.getElementById('subpasoEstado').value
            };
            if (!subpaso.descripcion) { alert('La descripción es obligatoria'); return; }
            if (!window.subpasosTemporales) window.subpasosTemporales = [];
            if (index >= 0) {
                window.subpasosTemporales[index] = subpaso;
            } else {
                window.subpasosTemporales.push(subpaso);
            }
            actualizarListaSubpasos();
            cancelarFormularioSubpaso();
        }

        function eliminarSubpaso(index) {
            if (confirm('¿Eliminar subpaso?')) {
                window.subpasosTemporales.splice(index, 1);
                actualizarListaSubpasos();
            }
        }

        function actualizarListaSubpasos() {
            const container = document.getElementById('subpasosContainer');
            const subpasos = window.subpasosTemporales || [];
            if (!subpasos.length) {
                container.innerHTML = '<p style="color: #8F95B2; text-align: center;">No hay subpasos</p>';
                return;
            }
            let html = '';
            subpasos.forEach((sub, i) => {
                html += `
                    <div class="subpaso-item">
                        <span>${sub.descripcion}</span>
                        <span class="fase-estado ${sub.estado === 'completado' ? 'estado-completado' : 'estado-pendiente'}" style="font-size:10px;">${sub.estado}</span>
                        <div>
                            <button class="btn-icon" onclick="mostrarFormularioSubpaso(${i})">✏️</button>
                            <button class="btn-icon" onclick="eliminarSubpaso(${i})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== ACTUALIZAR ESTADO DE FASE =====
        function actualizarEstadoFase(faseIndex) {
            const fase = fasesTemporales[faseIndex];
            if (!fase.pasos || fase.pasos.length === 0) { fase.estado = 'pendiente'; return; }
            let todosCompletados = true, algunoEnProgreso = false;
            fase.pasos.forEach(paso => {
                if (paso.estado !== 'completado') todosCompletados = false;
                if (paso.estado === 'en_progreso') algunoEnProgreso = true;
                paso.subpasos?.forEach(sub => {
                    if (sub.estado !== 'completado') todosCompletados = false;
                });
            });
            if (todosCompletados) fase.estado = 'completado';
            else if (algunoEnProgreso) fase.estado = 'en_progreso';
            else fase.estado = 'pendiente';
        }

        // ===== RENDERIZAR FASES =====
        function actualizarGridFases() {
            const container = document.getElementById('fasesContainer');
            if (!fasesTemporales.length) {
                container.innerHTML = '<p style="color:#8F95B2; text-align:center;">No hay fases. ¡Agrega una!</p>';
                return;
            }
            let html = '';
            fasesTemporales.forEach((fase, idx) => {
                const estadoClass = fase.estado === 'completado' ? 'estado-completado' : fase.estado === 'en_progreso' ? 'estado-progreso' : 'estado-pendiente';
                html += `
                    <div class="fase-card">
                        <div class="fase-header">
                            <span class="fase-nombre">${fase.nombre}</span>
                            <span class="fase-estado ${estadoClass}">${fase.estado}</span>
                            <div>
                                <button class="btn-icon" onclick="mostrarFormularioFase(${idx})">✏️</button>
                                <button class="btn-icon" onclick="eliminarFase(${idx})">🗑️</button>
                            </div>
                        </div>
                        <div class="pasos-container">
                            ${fase.pasos?.length ? fase.pasos.map((paso, pIdx) => {
                                const pasoEstadoClass = paso.estado === 'completado' ? 'estado-completado' : paso.estado === 'en_progreso' ? 'estado-progreso' : 'estado-pendiente';
                                return `
                                    <div class="paso-card">
                                        <div class="paso-header">
                                            <span class="paso-titulo">${paso.titulo}</span>
                                            <span class="fase-estado ${pasoEstadoClass}" style="font-size:11px;">${paso.estado}</span>
                                            <div class="paso-actions">
                                                <button class="btn-icon" onclick="mostrarFormularioPaso(${idx}, ${pIdx})">✏️</button>
                                                <button class="btn-icon" onclick="eliminarPaso(${idx}, ${pIdx})">🗑️</button>
                                            </div>
                                        </div>
                                        ${paso.descripcion ? `<p style="color:#5F6482; font-size:13px;">${paso.descripcion}</p>` : ''}
                                        ${paso.subpasos?.length ? `
                                            <div class="subpasos-container">
                                                ${paso.subpasos.map(sub => `<div class="subpaso-item"><span>• ${sub.descripcion}</span> <span class="fase-estado ${sub.estado==='completado'?'estado-completado':'estado-pendiente'}">${sub.estado}</span></div>`).join('')}
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('') : '<p style="color:#8F95B2; margin-left:12px;">Sin pasos</p>'}
                            <button class="btn-icon" style="margin:8px 0 0 12px;" onclick="mostrarFormularioPaso(${idx})"><i class="fas fa-plus"></i> Agregar Paso</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== MOSTRAR/OCULTAR FORMULARIO PROCESO =====
        function mostrarFormulario(procesoParaEditar = null) {
            document.getElementById('formProceso').classList.add('active');
            if (procesoParaEditar) {
                document.getElementById('formTitulo').textContent = 'Editar Proceso';
                document.getElementById('procesoId').value = procesoParaEditar.id;
                cargarDatosProceso(procesoParaEditar);
            } else {
                document.getElementById('formTitulo').textContent = 'Crear Nuevo Proceso';
                document.getElementById('procesoId').value = '';
                limpiarFormularioProceso();
            }
        }

        function cargarDatosProceso(proceso) {
            document.getElementById('servicio').value = proceso.servicio.nombre || '';
            document.getElementById('expediente').value = proceso.servicio.expediente || '';
            document.getElementById('clienteNombre').value = proceso.cliente.nombre || '';
            document.getElementById('clienteApodo').value = proceso.cliente.apodo || '';
            document.getElementById('clienteEmail').value = proceso.cliente.email || '';
            document.getElementById('codigoServicio').value = proceso.servicio.codigo || '';
            document.getElementById('idInterno').value = proceso.servicio.idInterno || '';
            document.getElementById('fechaInicio').value = proceso.servicio.fechaInicio || '';
            fasesTemporales = proceso.fases || [];
            actualizarGridFases();
        }

        function cancelarFormulario() {
            document.getElementById('formProceso').classList.remove('active');
            fasesTemporales = [];
            actualizarGridFases();
        }

        function limpiarFormularioProceso() {
            document.getElementById('servicio').value = '';
            document.getElementById('expediente').value = '';
            document.getElementById('clienteNombre').value = '';
            document.getElementById('clienteApodo').value = '';
            document.getElementById('clienteEmail').value = '';
            document.getElementById('codigoServicio').value = '';
            document.getElementById('idInterno').value = '';
            document.getElementById('fechaInicio').value = '';
            fasesTemporales = [];
            actualizarGridFases();
        }

        // ===== GUARDAR PROCESO EN FIREBASE =====
        async function guardarProceso() {
            const btn = document.getElementById('btnGuardarProceso');
            btn.innerHTML = '<span class="loader"></span> Guardando...';
            btn.disabled = true;

            const procesoId = document.getElementById('procesoId').value;
            const proceso = {
                servicio: {
                    nombre: document.getElementById('servicio').value.trim(),
                    expediente: document.getElementById('expediente').value.trim(),
                    fechaInicio: document.getElementById('fechaInicio').value,
                    codigo: document.getElementById('codigoServicio').value.trim(),
                    idInterno: document.getElementById('idInterno').value.trim()
                },
                cliente: {
                    nombre: document.getElementById('clienteNombre').value.trim(),
                    apodo: document.getElementById('clienteApodo').value.trim(),
                    email: document.getElementById('clienteEmail').value.trim()
                },
                fases: fasesTemporales,
                fechaCreacion: new Date().toLocaleDateString()
            };

            // Calcular progreso
            let totalPasos = 0, completados = 0;
            proceso.fases.forEach(fase => {
                fase.pasos?.forEach(paso => {
                    totalPasos++;
                    if (paso.estado === 'completado') completados++;
                    paso.subpasos?.forEach(sub => {
                        totalPasos++;
                        if (sub.estado === 'completado') completados++;
                    });
                });
            });
            proceso.progreso = {
                porcentaje: totalPasos ? Math.round((completados / totalPasos) * 100) : 0,
                completados,
                pendientes: totalPasos - completados,
                fase: 'En progreso'
            };

            try {
                if (procesoId) {
                    const procesoRef = ref(database, `procesos/${procesoId}`);
                    proceso.id = procesoId;
                    await set(procesoRef, proceso);
                } else {
                    const nuevosRef = push(ref(database, 'procesos'));
                    proceso.id = nuevosRef.key;
                    await set(nuevosRef, proceso);
                }
                alert('Proceso guardado correctamente');
                cancelarFormulario();
                await enviarEmailCliente(proceso);
            } catch (error) {
                alert('Error al guardar: ' + error.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> Guardar Proceso';
                btn.disabled = false;
            }
        }

        // ===== ENVIAR EMAIL AL CLIENTE =====
        async function enviarEmailCliente(proceso) {
            if (!proceso.cliente.email || proceso.cliente.email.includes('example') || proceso.cliente.email.trim() === '') {
                console.log('Email no enviado: dirección inválida o de ejemplo');
                return;
            }
            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        to: proceso.cliente.email,
                        subject: `⚖️ Tu caso ha sido actualizado - ${proceso.servicio.nombre}`,
                        html: generarEmailHTML(proceso)
                    })
                });
                if (response.ok) {
                    console.log('Email enviado correctamente');
                } else {
                    console.warn('Error al enviar email:', await response.text());
                }
            } catch (error) {
                console.error('Error en la petición de email:', error);
            }
        }

        // ===== CARGAR PROCESOS =====
        function cargarProcesos() {
            onValue(ref(database, 'procesos'), (snapshot) => {
                const procesos = [];
                snapshot.forEach(child => {
                    const p = child.val();
                    p.id = child.key;
                    procesos.push(p);
                });
                actualizarListaProcesos(procesos);
            });
        }

        function actualizarListaProcesos(procesos) {
            const contenedor = document.getElementById('listaProcesos');
            if (!procesos.length) {
                contenedor.innerHTML = '<p style="color:#8F95B2; text-align:center;">No hay procesos</p>';
                return;
            }
            let html = '';
            procesos.forEach(p => {
                const prog = p.progreso || { porcentaje: 0, completados: 0, pendientes: 0 };
                html += `
                    <div class="proceso-card">
                        <div class="proceso-header" onclick="toggleProceso('${p.id}')">
                            <h3>${p.servicio.nombre || 'Sin nombre'} - ${p.cliente.nombre || ''}</h3>
                            <span class="proceso-badge">${prog.porcentaje}%</span>
                        </div>
                        <div class="proceso-info">
                            <span>📋 ${p.servicio.codigo || ''}</span>
                            <span>📅 ${p.servicio.fechaInicio || ''}</span>
                            <span>✅ ${prog.completados}</span>
                            <span>⏳ ${prog.pendientes}</span>
                        </div>
                        <div class="proceso-pasos" id="pasos-${p.id}" style="display:none;">[detalles]</div>
                        <div class="proceso-link">
                            <span>🔗 Link cliente:</span>
                            <span class="link-cliente" onclick="copiarLink('${p.id}')">copiar</span>
                        </div>
                        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
                            <button class="btn-icon" onclick="editarProceso('${p.id}')">✏️ Editar</button>
                            <button class="btn-icon" onclick="eliminarProceso('${p.id}')">🗑️ Eliminar</button>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        function editarProceso(id) {
            document.getElementById('formProceso').classList.add('active');
            document.getElementById('formTitulo').textContent = 'Editar Proceso';
            document.getElementById('procesoId').value = id;
            const procesoRef = ref(database, `procesos/${id}`);
            onValue(procesoRef, (snapshot) => {
                const proceso = snapshot.val();
                if (proceso) {
                    cargarDatosProceso(proceso);
                }
            }, { onlyOnce: true });
        }

        function eliminarProceso(id) {
            if (confirm('¿Eliminar?')) remove(ref(database, `procesos/${id}`));
        }

        function toggleProceso(id) {
            const el = document.getElementById(`pasos-${id}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function copiarLink(id) {
            navigator.clipboard.writeText(`https://dashboard.conlecol.com/cliente/?id=${id}`);
            alert('Link copiado');
        }

        // ===== EXPONER FUNCIONES GLOBALES =====
        window.mostrarFormulario = mostrarFormulario;
        window.mostrarFormularioFase = mostrarFormularioFase;
        window.cancelarFormularioFase = cancelarFormularioFase;
        window.guardarFase = guardarFase;
        window.eliminarFase = eliminarFase;
        window.mostrarFormularioPaso = mostrarFormularioPaso;
        window.cancelarFormularioPaso = cancelarFormularioPaso;
        window.guardarPaso = guardarPaso;
        window.eliminarPaso = eliminarPaso;
        window.mostrarFormularioSubpaso = mostrarFormularioSubpaso;
        window.cancelarFormularioSubpaso = cancelarFormularioSubpaso;
        window.guardarSubpaso = guardarSubpaso;
        window.eliminarSubpaso = eliminarSubpaso;
        window.guardarProceso = guardarProceso;
        window.cancelarFormulario = cancelarFormulario;
        window.editarProceso = editarProceso;
        window.eliminarProceso = eliminarProceso;
        window.copiarLink = copiarLink;
        window.toggleProceso = toggleProceso;

        cargarProcesos();
    </script>
</body>
</html>
